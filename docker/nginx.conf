# =============================================
# Nginx Main Configuration
# AIGC GEO Overseas Platform - www.TopcentralGEO.com
# =============================================
# Routing rules:
#   /api/*      -> FastAPI Backend (8000)
#   /admin/*    -> React Admin Frontend (3000)
#   /*          -> Next.js Visitor Site (4000)
# =============================================

upstream backend {
    server backend:8000;
}

upstream frontend_admin {
    server frontend:3000;
}

upstream visitor_site {
    server visitor-site:4000;
}

# =============================================
# HTTP → HTTPS Redirect
# =============================================
server {
    listen 80;
    server_name www.TopcentralGEO.com;
    return 301 https://$server_name$request_uri;
}

# =============================================
# HTTPS Server
# =============================================
server {
    listen 443 ssl http2;
    server_name www.TopcentralGEO.com localhost 127.0.0.1;

    # SSL Certificates
    ssl_certificate /etc/letsencrypt/live/www.topcentralgeo.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.topcentralgeo.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/www.topcentralgeo.com/chain.pem;

    # SSL Settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;

    client_max_body_size 50M;
    client_body_buffer_size 128k;

    access_log /var/log/nginx/access.log combined;
    error_log  /var/log/nginx/error.log warn;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=63072000" always;

    # ==================== API ====================
    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_connect_timeout 60s;
        proxy_send_timeout    120s;
        proxy_read_timeout    300s;
        proxy_no_cache 1;
        proxy_cache_bypass 1;
        rewrite ^/api/v1/(.*) /api/$1 break;
    }

    location /docs {
        proxy_pass http://backend/docs;
        proxy_set_header Host $host;
    }

    location /openapi.json {
        proxy_pass http://backend/openapi.json;
        proxy_set_header Host $host;
    }

    location /health {
        proxy_pass http://backend/health;
        proxy_set_header Host $host;
    }

    # ==================== Admin Panel (React SPA) ====================
    location /admin/ {
        # If no hash route, redirect to login
        if ($arg__ = "") {
            rewrite ^/admin/$ /admin/#/login redirect;
        }
        proxy_pass http://frontend_admin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_intercept_errors on;
        error_page 404 =200 /admin/index.html;
    }

    # Admin static assets (Vite build output)
    location /assets/ {
        proxy_pass http://frontend_admin/assets/;
        proxy_set_header Host $host;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ==================== Visitor Site ====================
    location / {
        proxy_pass http://visitor_site;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        location ~* \.(jpg|jpeg|png|gif|ico|svg|webp|css|js|woff2?|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            add_header Access-Control-Allow-Origin "*";
            proxy_pass http://visitor_site;
        }
    }
}
